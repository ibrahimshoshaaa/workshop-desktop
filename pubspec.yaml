name: workshop_desktop
description: تطبيق سطح المكتب (ويندوز) لإدارة ورشة التنجيد والأثاث - نسخة متزامنة مع تطبيق الموبايل
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: 3.44.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  # قاعدة بيانات محلية (المصدر الأساسي للبيانات على الويندوز)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # الاتصال بـ Firebase عن طريق REST API (مفيش دعم SDK رسمي لويندوز)
  http: ^1.2.2

  # UI / Fonts
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # PDF / Excel export
  pdf: ^3.11.0
  printing: ^5.13.2
  excel: ^4.0.6

  # Utilities
  collection: ^1.18.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
