name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      # المشروع مرفوع بدون مجلد windows/ (بيتولّد تلقائيًا هنا في كل مرة)
      - name: Generate windows/ folder if missing
        shell: bash
        run: |
          if [ ! -d "windows" ]; then
            flutter create --platforms=windows .
          fi

      - name: Install dependencies
        run: flutter pub get
        
      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-fatal infos/warnings)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip build output
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath workshop-desktop-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: workshop-desktop-windows
          path: workshop-desktop-windows.zip
