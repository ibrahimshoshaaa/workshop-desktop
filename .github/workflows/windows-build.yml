name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    # بيسمح للـ GITHUB_TOKEN إنه ينشئ/يعدّل Release - مطلوب لخطوة الرفع
    # الأخيرة (الرفع كـ Release بدل Artifact)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      # المشروع مرفوع بدون مجلد windows/ (بيتولّد تلقائيًا هنا في كل مرة)
      - name: Generate windows/ folder if missing
        shell: bash
        run: |
          if [ ! -d "windows" ]; then
            flutter create --platforms=windows .
          fi

      # فلاتر بيحط اسم افتراضي (اسم المشروع) في شريط عنوان نافذة ويندوز.
      # الخطوة دي بتستبدله باسم "Tahoun Royal Home" بعد كل توليد لمجلد windows/
      - name: Set native window title
        shell: pwsh
        run: |
          $path = "windows/runner/main.cpp"
          $content = Get-Content -Path $path -Raw
          $content = $content -replace '(window\.Create\(L")[^"]*(")', '$1Tahoun Royal Home$2'
          Set-Content -Path $path -Value $content -NoNewline -Encoding UTF8BOM

      # أيقونة التطبيق (لوجو طاحون رويال هوم) - بتستبدل أيقونة فلاتر
      # الافتراضية بعد كل توليد لمجلد windows/
      - name: Apply custom app icon
        shell: bash
        run: cp assets/icon/app_icon.ico windows/runner/resources/app_icon.ico

      # اسم المنتج ووصف الملف اللي بيظهر لما تعمل مرور بالماوس على التطبيق
      # في الـ Taskbar أو في خصائص الملف (Properties) على ويندوز
      - name: Set product name metadata
        shell: pwsh
        run: |
          $path = "windows/runner/Runner.rc"
          $content = Get-Content -Path $path -Raw
          $content = $content -replace '(VALUE "FileDescription", ")[^"]*(")', '${1}Tahoun Royal Home${2}'
          $content = $content -replace '(VALUE "ProductName", ")[^"]*(")', '${1}Tahoun Royal Home${2}'
          Set-Content -Path $path -Value $content -NoNewline -Encoding UTF8BOM

      - name: Install dependencies
        run: flutter pub get
        
      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-fatal infos/warnings)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip build output
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath workshop-desktop-windows.zip

      - name: Upload Windows build to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-windows
          name: "آخر نسخة ويندوز"
          body: "آخر بناء ناجح من الفرع ${{ github.ref_name }} - كوميت ${{ github.sha }}"
          files: workshop-desktop-windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
